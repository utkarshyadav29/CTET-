<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz - Moti Potato</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .quiz-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin: 10px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .question-slide {
            display: none;
        }

        .question-slide.active {
            display: block;
            animation: fadeInRight 0.4s ease-out forwards;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1rem;
            font-weight: 800;
            color: #A97334;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 900;
            color: #4A3A2A;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-label {
            display: flex;
            align-items: center;
            background: #FFF8E7;
            border: 3px solid #FFE4B5;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #4A3A2A;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .option-label input[type="radio"] {
            display: none;
        }

        .option-label:hover {
            background: #FFF2B2;
        }

        .option-label.selected {
            background: #FFF2B2;
            border-color: #D29953;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transform: scale(1.02);
        }

        .option-label.correct {
            background: #E8F8F5;
            border-color: #4ECDC4 !important;
            color: #2C3E50;
        }

        .option-label.correct::after {
            content: '✅';
            position: absolute;
            right: 15px;
            font-size: 1.5rem;
        }

        .option-label.wrong {
            background: #FDEDEC;
            border-color: #FF6B6B !important;
            color: #78281F;
        }

        .option-label.wrong::after {
            content: '❌';
            position: absolute;
            right: 15px;
            font-size: 1.5rem;
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .small-btn {
            background: #4ECDC4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #3BA59C;
            transition: all 0.1s;
        }

        .small-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .cheat-btn {
            background: #FFD166;
            color: #4A3A2A;
            box-shadow: 0 4px 0 #E5B955;
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
        }

        .submit-ans-btn {
            background: #FF7E67;
            color: white;
            box-shadow: 0 4px 0 #E05D46;
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            margin-top: 20px;
            display: none; 
        }

        .next-btn {
            background: #5CC8D7;
            box-shadow: 0 4px 0 #3CA5B4;
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            margin-top: 20px;
            display: none; 
            color: white;
        }

        .explanation-box {
            margin-top: 25px;
            padding: 20px;
            background: #E8F8F5;
            border-left: 6px solid #4ECDC4;
            border-radius: 10px;
            display: none; 
        }

        .explanation-text {
            font-size: 1.1rem;
            color: #2C3E50;
            margin-bottom: 15px;
            font-weight: 700;
            line-height: 1.5;
        }

        .funny-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 1000;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #FF6B6B;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 90%;
            max-width: 400px;
        }

        .funny-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
        
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.show { display: block; }

        .score-board {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }

        .score-title {
            font-size: 2.5rem;
            color: #FF7E67;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .score-number {
            font-size: 4rem;
            color: #4ECDC4;
            font-weight: 900;
        }

        .top-bar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 10px;
        }

        .back-btn {
            background: white;
            border: 2px solid #ddd;
            width: 45px; height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    
    <!-- Changed overlay to not close popup if it's the strict timeout type -->
    <div class="overlay" id="overlay" onclick="closePopup()"></div>
    <div class="funny-popup" id="popup"></div>

    <div class="app-container" style="justify-content: flex-start; padding-top: 1rem;">
        <div class="header" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <button class="back-btn" onclick="window.location.href='subjects.html?mode=quiz'">🔙</button>
            <div class="subject-label" id="quiz-heading" style="font-weight: bold; font-size: 1.2rem;">Practice Quiz</div>
            <div id="timer-display" style="display: none; font-weight: bold; color: #FF7E67; background: white; padding: 5px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-left: auto;">90:00</div>
        </div>

        <div class="quiz-container" id="quiz-container">
            <!-- Questions injected here via JS -->
        </div>

        <!-- Resume Progress Prompt -->
        <div id="resume-modal" class="overlay" style="display:none; z-index: 1001; background: rgba(0,0,0,0.8);">
            <div class="popup show" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 400px; text-align: center;">
                <div style="font-size: 1.5rem; margin-bottom: 20px;">Mummy, start from where you left off? <br><br> (पिछाले प्रश्न से शुरू करें? 📖)</div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="small-btn" onclick="resumeProgress()" style="background: #4ECDC4; color: white;">Yes, Resume ✅</button>
                    <button class="small-btn" onclick="startFresh()" style="background: #FF7E67; color: white;">No, Start New 🔄</button>
                </div>
            </div>
        </div>

        <div class="score-board" id="score-board" style="text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #ffffff 0%, #fef3c7 100%); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); display: none; position: relative; overflow: hidden; border: 3px solid #FFD166;">
            <!-- Confetti / Decoration -->
            <div style="position: absolute; top: -10px; left: -10px; font-size: 3rem; opacity: 0.2; transform: rotate(-20deg);">🌟</div>
            <div style="position: absolute; bottom: 20px; right: -10px; font-size: 3rem; opacity: 0.2; transform: rotate(20deg);">🎉</div>
            <div style="position: absolute; top: 50%; left: 10px; font-size: 2rem; opacity: 0.2;">✨</div>
            
            <!-- Trophy SVG -->
            <svg viewBox="0 0 100 100" style="width: 120px; height: 120px; margin: 0 auto 20px; filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.1)); animation: bounceTrophy 2s infinite ease-in-out;">
                <path d="M20 20 h60 c 0 30, -15 45, -30 50 c -15 -5, -30 -20, -30 -50 Z" fill="#FFD166" />
                <path d="M30 20 h40 c 0 20, -10 35, -20 40 c -10 -5, -20 -20, -20 -40 Z" fill="#FFE082" />
                <!-- Left Handle -->
                <path d="M20 25 C5 25, 5 45, 20 45" fill="none" stroke="#FFD166" stroke-width="6" stroke-linecap="round" />
                <!-- Right Handle -->
                <path d="M80 25 C95 25, 95 45, 80 45" fill="none" stroke="#FFD166" stroke-width="6" stroke-linecap="round" />
                <!-- Base -->
                <rect x="35" y="70" width="30" height="20" rx="5" fill="#A97334" />
                <rect x="30" y="85" width="40" height="10" rx="5" fill="#4A3A2A" />
                <!-- Star -->
                <polygon points="50,30 53,38 61,38 54,43 56,51 50,47 44,51 46,43 39,38 47,38" fill="#FFF" />
            </svg>
            <style>
                @keyframes bounceTrophy { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
            </style>

            <div class="score-title" id="score-msg" style="font-size: 2rem; color: #FF7E67; font-weight: 900; margin-bottom: 10px; text-shadow: 1px 1px 0px rgba(0,0,0,0.1);"></div>
            <div class="score-number" id="score-number" style="font-size: 4.5rem; color: #4ECDC4; font-weight: 900; line-height: 1; margin: 20px 0; text-shadow: 2px 2px 0px rgba(0,0,0,0.1);"></div>
            
            <button class="btn btn-practice" style="width: 100%; margin-top: 20px; position: static; transform: none; opacity: 1; animation: none; border-radius: 15px;" onclick="window.location.href='index.html'">Go Home 🏠</button>
            <button class="btn btn-study" style="width: 100%; margin-top: 15px; position: static; transform: none; opacity: 1; animation: none; border-radius: 15px;" onclick="window.location.href='subjects.html?mode=quiz'">Try Another Quiz 🔄</button>
        </div>
    </div>

    <script>
        let subjectsData = [];
        fetch('quiz.json')
            .then(res => res.json())
            .then(data => {
                subjectsData = data;
                initializeQuiz();
            })
            .catch(err => console.error("Error loading quiz data:", err));
    </script>
    <script>
        let quizData = [];
        let isMegaQuiz = false;
        let isHindiMode = false;
        let wrongCount = 0;
        let score = 0;
        let currentQuestion = 0;
        let selectedOption = null;
        let timeLeft = 5400; 
        let timerInterval = null;
        let storageKey = '';

        function initializeQuiz() {
            const urlParams = new URLSearchParams(window.location.search);
            const subjectId = urlParams.get('subject') || 'history';
            const chapterId = urlParams.get('chapter') || 'mega_quiz';

            storageKey = `moti_potato_progress_${subjectId}_${chapterId}`;

            const subject = subjectsData.find(s => s.id === subjectId);
            if (subject) {
                if (chapterId === 'mega_quiz') {
                    // Dynamically generate mega quiz by combining all questions
                    quizData = [];
                    subject.chapters.forEach(c => {
                        if (c.quiz) quizData.push(...c.quiz);
                    });
                    isMegaQuiz = true;
                    document.getElementById('quiz-heading').innerText = '🏆 मेगा क्विझ (सर्व प्रश्न)';
                    shuffleArray(quizData);
                    document.getElementById('timer-display').style.display = 'block';
                } else {
                    const chapter = subject.chapters.find(c => c.id === chapterId);
                    if (chapter && chapter.quiz) {
                        quizData = [...chapter.quiz];
                        isMegaQuiz = (chapter.id === 'mega_quiz' || chapter.type === 'mega');
                        document.getElementById('quiz-heading').innerText = chapter.title_mr || chapter.name;
                        
                        if (isMegaQuiz) {
                            shuffleArray(quizData);
                            document.getElementById('timer-display').style.display = 'block';
                        }
                    }
                }
            }

            if (quizData.length === 0) {
                document.getElementById('quiz-container').innerHTML = '<div style="text-align:center; padding: 20px;">No questions found!</div>';
                return;
            }

            const savedData = localStorage.getItem(storageKey);
            if (savedData) {
                const progress = JSON.parse(savedData);
                if (progress.currentQuestion > 0 && progress.currentQuestion < quizData.length) {
                    document.getElementById('resume-modal').style.display = 'block';
                    return;
                }
            }
            startQuiz();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz() {
            if (isMegaQuiz) startTimer();
            renderQuestion(currentQuestion);
        }

        function resumeProgress() {
            const progress = JSON.parse(localStorage.getItem(storageKey));
            currentQuestion = progress.currentQuestion;
            score = progress.score;
            wrongCount = progress.wrongCount || 0;
            isHindiMode = progress.isHindiMode || false;
            if (progress.timeLeft) timeLeft = progress.timeLeft;
            
            document.getElementById('resume-modal').style.display = 'none';
            startQuiz();
        }

        function startFresh() {
            localStorage.removeItem(storageKey);
            document.getElementById('resume-modal').style.display = 'none';
            startQuiz();
        }

        function saveProgress() {
            const data = {
                currentQuestion: currentQuestion,
                score: score,
                wrongCount: wrongCount,
                isHindiMode: isHindiMode,
                timeLeft: timeLeft
            };
            localStorage.setItem(storageKey, JSON.stringify(data));
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showScoreBoard();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function renderQuestion(index) {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            selectedOption = null;

            if (index >= quizData.length) {
                showScoreBoard();
                return;
            }

            const q = quizData[index];
            const card = document.createElement('div');
            card.className = 'question-slide active';
            
            const questionText = isHindiMode ? q.q_hi : q.q_mr;
            const options = isHindiMode ? q.options_hi : q.options_mr;

            let optionsHtml = '';
            options.forEach((opt, optIndex) => {
                optionsHtml += `
                    <label class="option-label" id="label-${optIndex}">
                        <input type="radio" name="q_opt" value="${optIndex}" onchange="selectOption(${optIndex})">
                        ${opt}
                    </label>
                `;
            });

            card.innerHTML = `
                <div class="question-header"><span>प्रश्न ${index + 1} / ${quizData.length}</span></div>
                <div class="question-text" id="q-text">${questionText}</div>
                <div class="options-list">${optionsHtml}</div>
                <div class="action-row">
                    <button class="small-btn cheat-btn" style="${isHindiMode ? 'display:none' : ''}" onclick="cheatAndTranslate(${index})">Chalo cheating karti hu 👀</button>
                </div>
                <button class="small-btn submit-ans-btn" id="submit-btn" style="display:none" onclick="submitAnswer(${index})">Submit Answer</button>
                <div class="explanation-box" id="exp-box" style="display:none">
                    <div class="explanation-text" id="exp-text">${isHindiMode ? q.exp_hi : q.exp_mr}</div>
                    <button class="small-btn" onclick="toggleExpLang(${index}, this)">${isHindiMode ? 'मराठीत समजून घ्या 🔄' : 'हिंदी में समझें 🔄'}</button>
                </div>
                <button class="small-btn next-btn" id="next-btn" style="display:none" onclick="nextQuestion()">Next Question ➡️</button>
            `;
            container.appendChild(card);
        }

        function selectOption(optIndex) {
            document.querySelectorAll('.option-label').forEach(el => el.classList.remove('selected'));
            document.getElementById(`label-${optIndex}`).classList.add('selected');
            selectedOption = optIndex;
            document.getElementById('submit-btn').style.display = 'block';
        }

        function cheatAndTranslate(index) {
            showPopup("Teacher ho, sharam nahi aati 🤦‍♀️😂", 3000);
            isHindiMode = true;
            document.getElementById('q-text').innerText = quizData[index].q_hi;
            const options = quizData[index].options_hi;
            document.querySelectorAll('.option-label').forEach((el, idx) => {
                el.innerHTML = `<input type="radio" name="q_opt" value="${idx}" onchange="selectOption(${idx})" ${selectedOption === idx ? 'checked' : ''}> ${options[idx]}`;
            });
            document.querySelector('.cheat-btn').style.display = 'none';
        }

        function submitAnswer(qIndex) {
            if (selectedOption === null) return;
            document.getElementById('submit-btn').style.display = 'none';
            if(document.querySelector('.cheat-btn')) document.querySelector('.cheat-btn').style.display = 'none';
            document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);

            const isCorrect = (selectedOption === quizData[qIndex].correct);
            const selectedLabel = document.getElementById(`label-${selectedOption}`);
            const correctLabel = document.getElementById(`label-${quizData[qIndex].correct}`);
            correctLabel.classList.add('correct');

            if (isCorrect) {
                score++;
            } else {
                wrongCount++;
                selectedLabel.classList.add('wrong');
                if (wrongCount % 5 === 0 || Math.random() < 0.2) showPopup("Chee chee hag diya 💩", 3000);
            }
            document.getElementById('exp-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
            saveProgress();
        }

        function nextQuestion() {
            currentQuestion++;
            saveProgress();
            renderQuestion(currentQuestion);
        }

        function toggleExpLang(index, btnElement) {
            const q = quizData[index];
            const expTextEl = document.getElementById('exp-text');
            if (expTextEl.innerText === q.exp_mr) {
                expTextEl.innerText = q.exp_hi;
                btnElement.innerText = 'मराठीत समजून घ्या 🔄';
            } else {
                expTextEl.innerText = q.exp_mr;
                btnElement.innerText = 'हिंदी में समझें 🔄';
            }
        }

        let popupTimeout;
        function showPopup(message, duration = 3000) {
            const popup = document.getElementById('popup');
            const overlay = document.getElementById('overlay');
            popup.innerText = message;
            popup.classList.add('show');
            overlay.classList.add('show');
            clearTimeout(popupTimeout);
            popupTimeout = setTimeout(closePopup, duration);
        }

        function closePopup() {
            document.getElementById('popup').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }

        function showScoreBoard() {
            if (timerInterval) clearInterval(timerInterval);
            localStorage.removeItem(storageKey);
            document.getElementById('quiz-container').style.display = 'none';
            const board = document.getElementById('score-board');
            board.style.display = 'block';
            const msgEl = document.getElementById('score-msg');
            const numEl = document.getElementById('score-number');
            const percentage = Math.round((score / quizData.length) * 100);
            let currentScoreDisplay = 0;
            numEl.innerText = `0%`;
            const interval = setInterval(() => {
                if(currentScoreDisplay >= percentage) {
                    clearInterval(interval);
                    numEl.innerText = `${percentage}%`;
                } else {
                    currentScoreDisplay++;
                    numEl.innerText = `${currentScoreDisplay}%`;
                }
            }, 20);
            const detailsHtml = `<div style="font-size: 1.2rem; margin-top: 10px; color: #555;">Correct: <strong>${score}</strong> out of <strong>${quizData.length}</strong></div>`;
            if (percentage >= 90) msgEl.innerHTML = `🌟 Outstanding, Maa! 🌟${detailsHtml}`;
            else if (percentage >= 60) msgEl.innerHTML = `👍 Good Job! Keep Studying!${detailsHtml}`;
            else msgEl.innerHTML = `📚 Padhai Karna Hai wapas!${detailsHtml}`;
        }
    </script>
    <script>
        // Wrap everything in initializeQuiz
        const oldOnLoad = window.onload;
        window.onload = () => {
            if(oldOnLoad) oldOnLoad();
        };
    </script>
</body>
</html>
