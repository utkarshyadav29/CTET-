<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Padhai Karna Hai - Moti Potato</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .study-container {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            margin: 15px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .subject-label {
            background: #FF6B6B;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 10px;
        }

        .chapter-title {
            color: #4A3A2A;
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 25px;
            border-bottom: 3px solid #FFDEE9;
            padding-bottom: 10px;
            line-height: 1.3;
        }

        .slide {
            background: #FFF8E7;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #FFE4B5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .slide-title {
            color: #D2691E;
            font-weight: 900;
            margin-bottom: 15px;
            font-size: 1.3rem;
            line-height: 1.4;
        }

        .slide-content {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #4A3A2A;
            font-weight: 600;
        }

        .bhasha-btn {
            background: #4ECDC4;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 0 #3BA59C;
            transition: all 0.1s;
        }

        .bhasha-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #3BA59C;
        }

        .take-test-btn {
            width: 100%;
            margin-top: 30px;
            padding: 18px;
            font-size: 1.4rem;
            animation: none;
            transform: none;
            opacity: 1;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: white;
            border: 2px solid #ddd;
            width: 45px; height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    
    <div class="app-container" style="justify-content: flex-start; padding-top: 1rem;">
        <div class="top-bar">
            <!-- Go back to subjects page -->
            <button class="back-btn" onclick="window.location.href='subjects.html?mode=study'">🔙</button>
            <div class="subject-label">इतिहास (History)</div>
        </div>
        
        <div class="study-container">
            <h2 class="chapter-title">1935-1942 Freedom Struggle</h2>
            
            <div id="slides-container">
                <!-- Slides will be injected here by JS -->
            </div>

            <!-- Changed to go directly to quiz.html -->
            <button class="btn btn-practice take-test-btn" onclick="window.location.href='quiz.html?chapter=history_1'">
                <span class="btn-icon">📝</span>
                <span class="btn-text">Take Test Now</span>
            </button>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const subjectId = urlParams.get('subject') || 'history';
        const chapterId = urlParams.get('chapter') || 'history_1';

        let theoryData = [];
        let chapterTitle = '';

        // Find the correct subject and chapter
        const subject = subjectsData.find(s => s.id === subjectId);
        if (subject) {
            document.querySelector('.subject-label').innerText = subject.title_mr;
            const chapter = subject.chapters.find(c => c.id === chapterId);
            if (chapter) {
                theoryData = chapter.theory || [];
                chapterTitle = chapter.title_mr;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (chapterTitle) {
                document.querySelector('.chapter-title').innerText = chapterTitle;
            }

            const container = document.getElementById('slides-container');
            
            if (theoryData.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px;">No theory found for this chapter!</div>';
            }

            // Add Chapter Image
            const chapterObj = subject.chapters.find(c => c.id === chapterId);
            if (chapterObj && chapterObj.image) {
                const imgDiv = document.createElement('div');
                imgDiv.style.textAlign = 'center';
                imgDiv.style.marginBottom = '20px';
                imgDiv.innerHTML = `<img src="${chapterObj.image}" style="width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">`;
                container.appendChild(imgDiv);
            }

            theoryData.forEach((item, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                
                slide.innerHTML = `
                    <div class="slide-title" id="title-${index}">${item.title_mr}</div>
                    <div class="slide-content" id="content-${index}">${item.content_mr}</div>
                    <button class="bhasha-btn" onclick="toggleLanguage(${index}, this)">हिंदी में बदलें (Bhasha Badle) 🔄</button>
                `;
                container.appendChild(slide);
            });

            // Update quiz button url
            const testBtn = document.querySelector('.take-test-btn');
            testBtn.onclick = () => window.location.href = `quiz.html?subject=${subjectId}&chapter=${chapterId}`;
        });

        let langState = [];
        // initialized properly later
        
        // Use a function instead of top level array so theoryData is loaded
        function getLangState(index) {
            if (langState.length !== theoryData.length) {
                langState = new Array(theoryData.length).fill('mr');
            }
            return langState[index];
        }

        function toggleLanguage(index, btnElement) {
            if (getLangState(index) === 'mr') {
                document.getElementById(`title-${index}`).innerText = theoryData[index].title_hi;
                document.getElementById(`content-${index}`).innerText = theoryData[index].content_hi;
                btnElement.innerText = "मराठीत बदला (Bhasha Badle) 🔄";
                langState[index] = 'hi';
            } else {
                document.getElementById(`title-${index}`).innerText = theoryData[index].title_mr;
                document.getElementById(`content-${index}`).innerText = theoryData[index].content_mr;
                btnElement.innerText = "हिंदी में बदलें (Bhasha Badle) 🔄";
                langState[index] = 'mr';
            }
        }
    </script>
</body>
</html>
