<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Subject - Moti Potato</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-title {
            text-align: center;
            font-size: 2.2rem;
            color: #FF6B6B;
            font-weight: 900;
            margin: 20px 0;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }

        .accordion-container {
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 2;
        }

        .subject-header {
            background: #FFF2B2;
            border: 2px solid #D29953;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.4rem;
            font-weight: 800;
            color: #4A3A2A;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .subject-header:active {
            transform: scale(0.98);
        }

        .dropdown-icon {
            transition: transform 0.3s;
        }

        .subject-header.active .dropdown-icon {
            transform: rotate(180deg);
        }

        .chapters-list {
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #FAFAFA;
            border-radius: 0 0 15px 15px;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }

        .subject-header.active + .chapters-list {
            max-height: 500px;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            margin-top: -5px;
            padding-top: 10px;
        }

        .chapter-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            border-bottom: 1px solid #EEE;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #555;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chapter-btn:last-child {
            border-bottom: none;
        }

        .chapter-btn:hover {
            background: #F0F8FF;
            color: #4ECDC4;
        }
        
        .top-bar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 10px;
        }

        .back-btn {
            background: white;
            border: 2px solid #ddd;
            width: 45px; height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    
    <div class="app-container" style="justify-content: flex-start;">
        <div class="top-bar">
            <button class="back-btn" onclick="window.location.href='index.html'">🔙</button>
        </div>
        
        <h1 class="page-title" id="page-title">Select Subject</h1>
        
        <div class="accordion-container" id="subjects-container">
            <!-- Dynamically populated -->
        </div>
    </div>

    <script src="./data.js?v=2"></script>
    <script>
        // Check mode from URL
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'study';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('page-title').innerText = mode === 'quiz' ? 'Select Quiz 📝' : 'Padhai Karna Hai 📖';

            if (typeof subjectsData === 'undefined') {
                document.getElementById('subjects-container').innerHTML = '<div style="text-align:center; padding:20px;">Data failed to load. Please refresh.</div>';
                return;
            }
            renderSubjects();
        });

        function renderSubjects() {
            const container = document.getElementById('subjects-container');
            container.innerHTML = '';
            
            subjectsData.forEach(subject => {
                let chaptersHtml = '';
                subject.chapters.forEach(chapter => {
                    chaptersHtml += `
                        <button class="chapter-btn" onclick="goToChapter('${subject.id}', '${chapter.id}')">
                            ${chapter.title_mr}
                        </button>
                    `;
                });
                
                const subjectHtml = `
                    <div class="subject-header" onclick="toggleAccordion(this)">
                        <span>${subject.title_mr}</span>
                        <span class="dropdown-icon">▼</span>
                    </div>
                    <div class="chapters-list">
                        ${chaptersHtml}
                    </div>
                `;
                container.innerHTML += subjectHtml;
            });
        }

        function toggleAccordion(element) {
            element.classList.toggle('active');
        }

        function goToChapter(subjectId, chapterId) {
            if (mode === 'quiz') {
                window.location.href = `quiz.html?subject=${subjectId}&chapter=${chapterId}`;
            } else {
                window.location.href = `study.html?subject=${subjectId}&chapter=${chapterId}`;
            }
        }
    </script>
</body>
</html>
